<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WeatherBet — Live Edge Feed</title>
<style>
  :root{
    --bg:#0c0f17; --panel:#141925; --panel2:#1b2230; --line:#27304320;
    --border:#222b3d; --text:#e7ecf5; --muted:#8b97ad; --faint:#5c6982;
    --green:#34d399; --green-bg:#34d39915; --red:#f87171; --red-bg:#f8717115;
    --amber:#fbbf24; --accent:#6ea8fe; --accent-bg:#6ea8fe18;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:radial-gradient(1200px 600px at 80% -10%, #18203200, #0c0f17),
    var(--bg); color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1200px; margin:0 auto; padding:28px 22px 80px}
  header{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap}
  header h1{margin:0; font-size:22px; letter-spacing:-.3px}
  header .sub{color:var(--muted); margin-top:4px; font-size:13px}
  header .sub b{color:var(--accent); font-weight:600}

  /* live status */
  .live{display:flex; align-items:center; gap:9px; background:var(--panel);
    border:1px solid var(--border); border-radius:999px; padding:7px 14px;
    font-size:13px; color:var(--muted); white-space:nowrap}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--green);
    box-shadow:0 0 0 0 var(--green); animation:pulse 1.8s infinite}
  .dot.paused{background:var(--faint); animation:none; box-shadow:none}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 #34d39966} 70%{box-shadow:0 0 0 7px #34d39900}
    100%{box-shadow:0 0 0 0 #34d39900}}
  .live b{color:var(--text); font-weight:600}

  /* stat cards */
  .cards{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:22px 0}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px}
  .card .k{color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.6px}
  .card .v{font-size:22px; font-weight:650; margin-top:6px; letter-spacing:-.5px;
    font-variant-numeric:tabular-nums}
  .v.green{color:var(--green)} .v.red{color:var(--red)} .v.amber{color:var(--amber)}

  /* controls */
  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background:var(--panel); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 14px}
  select,.btn{background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:9px; padding:7px 12px; font-size:13px; cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .chk{display:flex; align-items:center; gap:6px; color:var(--muted); font-size:13px;
    cursor:pointer; user-select:none}
  .chk input{accent-color:var(--accent)}
  .spacer{flex:1}
  .hint{color:var(--faint); font-size:12px}

  /* table */
  .tablewrap{margin-top:16px; border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; background:var(--panel)}
  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{position:sticky; top:0; background:var(--panel2); color:var(--faint);
    text-align:right; padding:11px 12px; font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.5px; cursor:pointer; white-space:nowrap;
    border-bottom:1px solid var(--border)}
  thead th.l{text-align:left}
  thead th .ar{color:var(--accent); font-size:10px}
  tbody td{padding:10px 12px; text-align:right; border-bottom:1px solid var(--line);
    white-space:nowrap; font-variant-numeric:tabular-nums}
  tbody td.l{text-align:left}
  tbody tr:hover{background:#ffffff06}
  tbody tr.signal{box-shadow:inset 3px 0 0 var(--green)}
  td.flash{animation:flash .6s ease-out}
  @keyframes flash{from{background:var(--accent-bg)} to{background:transparent}}
  .city{font-weight:600}
  .mlink{color:var(--text); text-decoration:none; font-weight:600}
  .mlink:hover{color:var(--accent)}
  .mlink .ext{color:var(--faint); font-size:11px; margin-left:1px}
  .mlink:hover .ext{color:var(--accent)}
  .sub2{color:var(--muted); font-size:12px}
  .tag{display:inline-block; font-size:10px; font-weight:650; padding:2px 7px;
    border-radius:20px; letter-spacing:.3px; vertical-align:middle}
  .tag.match{background:var(--accent-bg); color:var(--accent)}
  .tag.sig{background:var(--green-bg); color:var(--green)}
  .bucket{font-weight:600}
  .empty{padding:48px; text-align:center; color:var(--faint)}
  .empty b{color:var(--muted)}
  @media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)} .hide-sm{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>🌤 WeatherBet — Live Edge Feed</h1>
      <div class="sub">Today's Polymarket weather markets, auto-refreshing ·
        thresholds: <b id="cfg">…</b></div>
    </div>
    <div class="live"><span class="dot" id="dot"></span><span id="status">connecting…</span></div>
  </header>

  <div class="cards" id="cards"></div>

  <div class="controls">
    <select id="region">
      <option value="all">All regions</option>
      <option value="us">US</option>
      <option value="eu">Europe</option>
      <option value="asia">Asia</option>
    </select>
    <label class="chk"><input type="checkbox" id="onlySig"> Only signals</label>
    <label class="chk"><input type="checkbox" id="onlyMatch"> Forecast bucket only</label>
    <span class="spacer"></span>
    <span class="hint" id="count"></span>
    <button class="btn" id="pause">⏸ Pause</button>
  </div>

  <div class="tablewrap">
    <table>
      <thead><tr>
        <th class="l" data-k="city_name">City</th>
        <th data-k="forecast">Forecast</th>
        <th class="l" data-k="bucket">Bucket</th>
        <th data-k="price">Price</th>
        <th data-k="prob">Model P</th>
        <th data-k="edge">Edge</th>
        <th data-k="ev">EV</th>
        <th data-k="size" class="hide-sm">Kelly $</th>
        <th data-k="volume" class="hide-sm">Vol</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty">Warming up the live feed…</div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let CFG = {min_ev:0.1}, REGION = {}, MODE_REGION = "all";
let ROWS = [], PREV = {}, META = {};
let SORT = {k:"edge", dir:-1};
let PAUSED = false, lastMs = 0;

const fmtPct  = x => x==null ? "—" : (x*100).toFixed(0)+"%";
const fmtSign = x => (x>=0?"+":"") + x.toFixed(3);
const deg     = (t,u) => t==null ? "—" : (Math.round(t*10)/10)+"°"+(u==="F"?"F":"C");
const getJSON = async u => (await fetch(u, {cache:"no-store"})).json();
const keyOf   = r => r.city+"|"+r.t_low+"|"+r.t_high;

async function boot(){
  const c = await getJSON("/api/cities");
  CFG = c.config;
  c.cities.forEach(x => REGION[x.slug] = x.region);
  $("#cfg").textContent = `EV ≥ ${CFG.min_ev} · price < $${CFG.max_price} · vol ≥ ${CFG.min_volume}`;
  tick();                       // first fetch
  setInterval(tick, 2500);      // poll the local feed often so the ~5s server
                                // refresh shows up promptly (no external calls)
  setInterval(renderStatus, 1000);
}

async function tick(){
  if(PAUSED) return;
  try{
    const d = await getJSON("/api/feed");
    META = d;
    if(d.updated_at){
      const ms = Date.parse(d.updated_at);
      if(ms !== lastMs){               // new cycle → remember old prices for flash
        PREV = {}; ROWS.forEach(r => PREV[keyOf(r)] = r.price);
        lastMs = ms;
      }
    }
    ROWS = d.rows || [];
    render();
  }catch(e){ $("#status").textContent = "reconnecting…"; }
}

function regionRows(){
  let rows = ROWS.filter(r => MODE_REGION==="all" || REGION[r.city]===MODE_REGION);
  if($("#onlySig").checked)   rows = rows.filter(r=>r.is_signal);
  if($("#onlyMatch").checked) rows = rows.filter(r=>r.is_match);
  rows.sort((a,b)=>{
    const x=a[SORT.k], y=b[SORT.k];
    if(typeof x==="string") return SORT.dir*x.localeCompare(y);
    return SORT.dir*((x??-1)-(y??-1));
  });
  return rows;
}

function renderCards(){
  const rows = ROWS.filter(r => MODE_REGION==="all" || REGION[r.city]===MODE_REGION);
  const sigs = rows.filter(r=>r.is_signal);
  const best = rows.reduce((m,r)=>Math.max(m, r.edge), 0);
  const cards = [
    ["Cities live", META.open_cities ?? "—", ""],
    ["Open markets", rows.length, ""],
    ["Signals", sigs.length, sigs.length?"green":""],
    ["Best edge", rows.length?fmtSign(best):"—", best>0?"green":""],
    ["Refresh", META.cycle_ms!=null ? (META.cycle_ms/1000).toFixed(1)+"s" : "—", ""],
  ];
  $("#cards").innerHTML = cards.map(([k,v,c])=>
    `<div class="card"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join("");
}

function renderStatus(){
  const dot = $("#dot");
  if(PAUSED){ dot.classList.add("paused"); $("#status").textContent="paused"; return; }
  dot.classList.remove("paused");
  if(!lastMs){ $("#status").textContent="warming up…"; return; }
  const ago = Math.max(0, Math.round((Date.now()-lastMs)/1000));
  $("#status").innerHTML = `<b>LIVE</b> · updated ${ago}s ago · ${META.open_cities||0} cities`;
}

function render(){
  renderCards(); renderStatus();
  const rows = regionRows();
  $("#count").textContent = ROWS.length
    ? `${rows.length} shown · ${rows.filter(r=>r.is_signal).length} signals`
    : "";
  const ready = META.ready;
  $("#empty").style.display = rows.length ? "none" : "block";
  if(!ready){ $("#empty").innerHTML = "Warming up the live feed…"; }
  else if(!ROWS.length){ $("#empty").innerHTML = "No cities have open markets for today right now."; }
  else if(!rows.length){
    $("#empty").innerHTML = ($("#onlySig").checked||$("#onlyMatch").checked)
      ? "No rows match the current filters." : "No open markets in this region right now.";
  }
  $("#rows").innerHTML = rows.map(rowHTML).join("");
  // sort arrow
  document.querySelectorAll("thead th").forEach(th=>{
    const a=th.querySelector(".ar"); if(a) a.remove();
    if(th.dataset.k===SORT.k){
      const s=document.createElement("span"); s.className="ar";
      s.textContent=SORT.dir<0?" ▼":" ▲"; th.appendChild(s);
    }
  });
}

function rowHTML(r){
  const ec = r.edge>0?"green":r.edge<0?"red":"";
  const vc = r.ev>0?"green":r.ev<0?"red":"";
  const tags = [];
  if(r.is_match)  tags.push('<span class="tag match">forecast</span>');
  if(r.is_signal) tags.push('<span class="tag sig">signal</span>');
  // flash price cell if it changed since last cycle
  const prev = PREV[keyOf(r)];
  const flash = (prev!==undefined && prev!==r.price) ? "flash" : "";
  const col = (v,c)=>`<td class="${c||""}">${v}</td>`;
  return `<tr class="${r.is_signal?"signal":""}">
    <td class="l"><a class="mlink" href="${r.url}" target="_blank" rel="noopener" title="Open on Polymarket">${r.city_name} <span class="ext">↗</span></a></td>
    ${col(`${deg(r.forecast,r.unit)} <span class="sub2">${r.source}</span>`)}
    <td class="l"><span class="bucket">${r.bucket}</span> ${tags.join(" ")}</td>
    ${col("$"+r.price.toFixed(2), flash)}
    ${col(fmtPct(r.prob))}
    ${col(fmtSign(r.edge), ec)}
    ${col(fmtSign(r.ev), vc)}
    ${col(r.size?("$"+r.size.toFixed(2)):"—","hide-sm")}
    ${col(r.volume?Math.round(r.volume).toLocaleString():"—","hide-sm")}
  </tr>`;
}

// events
$("#region").addEventListener("change", e=>{ MODE_REGION=e.target.value; render(); });
$("#onlySig").addEventListener("change", render);
$("#onlyMatch").addEventListener("change", render);
$("#pause").addEventListener("click", ()=>{
  PAUSED=!PAUSED;
  $("#pause").textContent = PAUSED ? "▶ Resume" : "⏸ Pause";
  if(!PAUSED) tick();
  renderStatus();
});
document.querySelectorAll("thead th").forEach(th=>{
  th.addEventListener("click", ()=>{
    if(SORT.k===th.dataset.k) SORT.dir*=-1;
    else SORT={k:th.dataset.k, dir:(th.dataset.k==="city_name"||th.dataset.k==="bucket")?1:-1};
    render();
  });
});

boot();
</script>
</body>
</html>
